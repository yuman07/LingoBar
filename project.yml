name: LingoBar
options:
  bundleIdPrefix: com.yuman
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  LingoBar:
    type: application
    platform: macOS
    sources:
      - LingoBar
    settings:
      base:
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        ARCHS: arm64
        PRODUCT_BUNDLE_IDENTIFIER: com.yuman.LingoBar
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: LingoBar/Info.plist
        CODE_SIGN_ENTITLEMENTS: LingoBar/LingoBar.entitlements
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_NAME: LingoBar
    dependencies:
      - package: KeyboardShortcuts
      - package: Sparkle
